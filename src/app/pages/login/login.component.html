<form (ngSubmit)="onSubmit()">

  <div class="input-group">
    <label>Email</label>
    <input 
      type="email" 
      [(ngModel)]="email" 
      name="email"
      placeholder="Digite seu email">
  </div>

  <div class="input-group">
    <label>Senha</label>
    <input 
      type="password" 
      [(ngModel)]="senha" 
      name="senha"
      placeholder="Digite sua senha">
  </div>

  <button type="submit">Entrar</button>
  <p *ngIf="erro" style="color: red; text-align: center;">
  {{ erro }}
</p>

</form>
